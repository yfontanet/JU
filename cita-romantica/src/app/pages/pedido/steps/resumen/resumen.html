<div class="resume-container">

  <div class="overlay"></div>

  <div class="card">

    <h2>Resum de la teva cita ❤️</h2>

    <div class="section">
      <h3>Primer plat</h3>
      <p>{{ format(state.pedido().primerPlato) }}</p>
    </div>

    <div class="section">
      <h3>Complements</h3>
      <ul>
        <li *ngFor="let c of state.pedido().complementos">
          {{ format(c) }}
        </li>
      </ul>
    </div>

    <div class="section">
      <h3>Postres</h3>
      <ul>
        <li *ngFor="let p of state.pedido().postres">
          {{ format(p) }}
        </li>
      </ul>
    </div>

    <button class="confirm" (click)="confirmar()">
      Confirmar pedido ❤️
    </button>

  </div>

</div>
